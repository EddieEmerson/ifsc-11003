<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab – Exercise 4 (Absolute)</title>
  <style type="text/css">
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }
    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      color: #FFF;
      text-align: center;
      line-height: 24px;
    }
    #wrapper {
      background-color: #FFF;
      border: 1px solid #c0c0c0;
      width: 800px;
      height: 600px;
      margin-right: auto;
      margin-left: auto;
      text-shadow: 2px 2px #000;
      position: relative;
    }
    #navy  { background-color: #001f3f; }
    #teal  { background-color: #39CCCC; }
    #blue  { background-color: #0074D9; }
    #aqua  { background-color: #7FDBFF; }
    #footer { background-color: #666; }

    #navy, #teal, #blue, #aqua {
      position: absolute;
      width: 110px;
      height: 110px;
      line-height: 110px;
    }
    #navy  { top: 60px;    left: 80px; }
    #teal  { top: 60px;    right: 80px; }
    #blue  { bottom: 60px; left: 80px; }
    #aqua  { bottom: 60px; right: 80px; }

    #footer {
      position: absolute;
      width: 130px;
      height: 130px;
      line-height: 130px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -10%);
    }
    h1 {
      color: #000;
      font-weight: normal;
      padding: 20px;
      position: absolute;
      width: 100%;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <section id="wrapper">
    <h1>Exercise</h1>
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Footer</div>
  </section>
</body>
</html>
