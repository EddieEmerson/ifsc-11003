<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab – Exercise 1 (Float)</title>
  <style type="text/css">
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }
    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      color: #FFF;
      text-align: center;
      line-height: 24px;
    }
    #wrapper {
      background-color: #FFF;
      border: 1px solid #c0c0c0;
      width: 800px;
      margin-right: auto;
      margin-left: auto;
      text-shadow: 2px 2px #000;
      overflow: hidden;
    }
    #navy  { background-color: #001f3f; }
    #teal  { background-color: #39CCCC; }
    #blue  { background-color: #0074D9; }
    #aqua  { background-color: #7FDBFF; }
    #footer { background-color: #666; }

    #navy, #teal, #blue, #aqua {
      float: left;
      width: 50%;
      height: 120px;
      line-height: 120px;
    }
    #footer {
      clear: both;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <h1 style="color:#000;font-weight:normal;padding:20px;">Exercise 1 — Float</h1>
  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Footer</div>
  </section>
</body>
</html>
